<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>แดชบอร์ด 5ส ห้องงานระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0e2a3d; --navy-2:#123a52; --teal:#0f7a72; --teal-light:#e6f4f2;
    --amber:#c8791a; --amber-light:#fbeee0; --red:#b7362f; --red-light:#fbeceb;
    --paper:#f7f5f0; --line:#dcd8cd; --ink:#1b1f22; --muted:#6b7178;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sarabun',sans-serif;background:var(--paper);color:var(--ink);}
  .topbar{background:var(--navy);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .topbar .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.65;margin-bottom:2px;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;}
  .wrap{max-width:920px;margin:0 auto;padding:16px 16px 60px;}

  .stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .stat{
    flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;
  }
  .stat .num{font-size:26px;font-weight:700;color:var(--navy);}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
  .stat.issue .num{color:var(--red);}
  .stat.done .num{color:var(--teal);}

  .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .tab{
    padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:#fff;
    font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;
  }
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filters select, .filters input{
    padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:13.5px;background:#fff;
  }
  .filters input{flex:1;min-width:160px;}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
  thead th{
    background:var(--teal-light);color:var(--navy);text-align:left;font-size:12.5px;
    padding:10px 12px;font-weight:700;letter-spacing:.02em;
  }
  tbody td{padding:10px 12px;font-size:13.5px;border-top:1px solid #eee;vertical-align:middle;}
  tbody tr:hover{background:#fafafa;}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .badge.pending{background:#eee;color:var(--muted);}
  .badge.done{background:var(--teal-light);color:var(--teal);}
  .badge.issue{background:var(--red-light);color:var(--red);}
  .row-link{color:var(--navy);text-decoration:none;font-weight:700;font-size:13px;}
  .row-link:hover{text-decoration:underline;}
  .empty{padding:40px 0;text-align:center;color:var(--muted);}
  .foot-links{margin-top:18px;display:flex;gap:16px;font-size:13px;}
  .foot-links a{color:var(--navy);text-decoration:none;font-weight:600;}
  .card-mobile{display:none;}
  @media (max-width:700px){
    table{display:none;}
    .card-mobile{display:block;}
    .room-row-card{
      background:#fff;border:1px solid var(--line);border-radius:12px;
      padding:12px 14px;margin-bottom:8px;
    }
    .room-row-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
    .room-row-card .name{font-weight:700;font-size:14px;}
    .room-row-card .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  }
</style>
</head>

<div class="topbar">
  <div class="eyebrow">อาคารภูมิสิริมังคลานุสรณ์ · กิจกรรม 5ส ห้องงานระบบ</div>
  <h1>แดชบอร์ดหัวหน้างาน</h1>
</div>

<div class="wrap">
  <div class="stat-row" id="statRow"></div>
  <div id="syncNote" style="font-size:12px;color:var(--muted);margin:-6px 0 12px;"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="today">ห้องที่ต้องตรวจวันนี้</button>
    <button class="tab" data-tab="all">ห้องทั้งหมด (257)</button>
    <button class="tab" data-tab="issues">พบปัญหา</button>
    <button class="tab" data-tab="pending">ยังไม่ซิงค์</button>
  </div>

  <div class="filters">
    <input type="text" id="searchBox" placeholder="ค้นหาชื่อห้อง...">
    <select id="floorFilter"><option value="">ทุกชั้น</option></select>
    <select id="zoneFilter"><option value="">ทุกโซน</option></select>
    <select id="supFilter"><option value="">ทุกหัวหน้าช่าง</option></select>
  </div>

  <table>
    <thead>
      <tr><th>ห้อง</th><th>ชั้น</th><th>โซน</th><th>รอบตรวจ</th><th>สถานะวันนี้</th><th></th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="card-mobile" id="cardMobile"></div>
  <div class="empty" id="emptyState" style="display:none">ไม่พบห้องตามเงื่อนไขที่เลือก</div>

  <div class="foot-links">
    <a href="checklist.html">+ เปิดฟอร์มตรวจห้อง</a>
    <a href="qr_sheet.html">พิมพ์ QR code ทุกห้อง</a>
  </div>
</div>

"day_raw": "วันที่ 29", "shift": "กะบ่าย เวลา เวลา 17.00-1.00 น", "supervisor": "นาย อุทัย สินทรหัวหน้าช่างเทคนิค", "day_num": 29}];
const CONFIG = {
  STORAGE_KEY: "fivess_records_v1",
  // ต้องตรงกับ GAS_URL ที่ตั้งไว้ใน checklist.html — ใส่ URL เดียวกันที่นี่
  // เพื่อให้แดชบอร์ดดึงผลตรวจของ "ทุกคน" จาก Google Sheet กลาง ไม่ใช่แค่เครื่องนี้เครื่องเดียว
  GAS_URL: "https://script.google.com/macros/s/AKfycbz_NyfEA-oiXAQ3kJK3xix-TEGE_Nh_meC_vknvHrBsXp8WtQG3P0aaB-QTgkWAR9ze/exec"
};

function getRecords(){
  try{ return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || "[]"); }catch(e){ return []; }
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayDayNum(){ return new Date().getDate(); }

let activeTab = "today";
let records = getRecords();      // local device records (used for "ยังไม่ซิงค์" tab)
let remoteRecords = [];          // records from the central Google Sheet — all technicians, all devices
let remoteSyncNote = "";

async function loadRemoteRecords(){
  if (!CONFIG.GAS_URL){
    remoteSyncNote = "ยังไม่ได้ตั้งค่า GAS_URL — แดชบอร์ดนี้แสดงผลจากเครื่องนี้เท่านั้น (ไม่เห็นผลตรวจของช่างคนอื่น)";
    renderSyncNote();
    return;
  }
  try{
    const resp = await fetch(CONFIG.GAS_URL + "?action=records");
    if (resp.ok){
      remoteRecords = await resp.json();
      remoteSyncNote = "";
    } else {
      remoteSyncNote = "ดึงข้อมูลกลางไม่สำเร็จ — แสดงผลจากเครื่องนี้ชั่วคราว";
    }
  }catch(e){
    remoteSyncNote = "ไม่มีสัญญาณ/เชื่อมต่อ Sheet ไม่ได้ — แสดงผลจากเครื่องนี้ชั่วคราว";
  }
  renderSyncNote();
  renderStats();
  render();
}
function renderSyncNote(){
  const el = document.getElementById("syncNote");
  if (el) el.textContent = remoteSyncNote;
}

function allRecords(){
  // remote (central sheet, all technicians) + any local records not yet synced up
  const unsyncedLocal = records.filter(r => !r.synced);
  return remoteRecords.concat(unsyncedLocal);
}

function latestRecordFor(roomId, dateStr){
  const matches = allRecords().filter(r => String(r.roomId)===String(roomId) && (!dateStr || r.inspDate===dateStr));
  if (!matches.length) return null;
  return matches.sort((a,b)=> new Date(b.submittedAt) - new Date(a.submittedAt))[0];
}
function hasIssue(rec){
  return rec && (rec.clean==="bad" || rec.lock==="bad" || rec.floorStatus==="bad");
}

function statusBadge(room){
  const rec = latestRecordFor(room.id, todayStr());
  if (!rec) return `<span class="badge pending">ยังไม่ตรวจ</span>`;
  if (hasIssue(rec)) return `<span class="badge issue">พบปัญหา</span>`;
  return `<span class="badge done">ตรวจแล้ว</span>`;
}

function populateFilters(){
  const floors = [...new Set(ROOMS.map(r=>r.floor))];
  const zones = [...new Set(ROOMS.map(r=>r.zone))];
  const sups = [...new Set(ROOMS.map(r=>r.supervisor))].filter(Boolean);
  const floorSel = document.getElementById("floorFilter");
  floors.forEach(f=>{ const o=document.createElement("option"); o.value=f; o.textContent="ชั้น "+f; floorSel.appendChild(o); });
  const zoneSel = document.getElementById("zoneFilter");
  zones.forEach(z=>{ const o=document.createElement("option"); o.value=z; o.textContent=z; zoneSel.appendChild(o); });
  const supSel = document.getElementById("supFilter");
  sups.forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=s.replace("หัวหน้าช่างเทคนิค",""); supSel.appendChild(o); });
}

function renderStats(){
  const todayRecs = allRecords().filter(r=>r.inspDate===todayStr());
  const doneRoomIds = new Set(todayRecs.map(r=>r.roomId));
  const issueCount = todayRecs.filter(hasIssue).length;
  const pendingSync = records.filter(r=>!r.synced).length;
  document.getElementById("statRow").innerHTML = `
    <div class="stat"><div class="num">${ROOMS.length}</div><div class="lbl">ห้องทั้งหมด</div></div>
    <div class="stat done"><div class="num">${doneRoomIds.size}</div><div class="lbl">ตรวจแล้ววันนี้</div></div>
    <div class="stat issue"><div class="num">${issueCount}</div><div class="lbl">พบปัญหาวันนี้</div></div>
    <div class="stat"><div class="num">${pendingSync}</div><div class="lbl">รายการยังไม่ซิงค์</div></div>
  `;
}

function getFilteredRooms(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const floor = document.getElementById("floorFilter").value;
  const zone = document.getElementById("zoneFilter").value;
  const sup = document.getElementById("supFilter").value;

  let list = ROOMS.slice();
  if (activeTab === "today"){
    const dn = todayDayNum();
    list = list.filter(r => r.day_num === dn);
  } else if (activeTab === "issues"){
    const issueRoomIds = new Set(allRecords().filter(r=>r.inspDate===todayStr() && hasIssue(r)).map(r=>r.roomId));
    list = list.filter(r => issueRoomIds.has(r.id));
  } else if (activeTab === "pending"){
    const pendingRoomIds = new Set(records.filter(r=>!r.synced).map(r=>r.roomId));
    list = list.filter(r => pendingRoomIds.has(r.id));
  }
  if (q) list = list.filter(r => (r.name+" "+r.floor).toLowerCase().includes(q));
  if (floor) list = list.filter(r => r.floor === floor);
  if (zone) list = list.filter(r => r.zone === zone);
  if (sup) list = list.filter(r => r.supervisor === sup);
  return list;
}

function render(){
  const list = getFilteredRooms();
  const tbody = document.getElementById("tableBody");
  const cardMobile = document.getElementById("cardMobile");
  document.getElementById("emptyState").style.display = list.length ? "none" : "block";

  tbody.innerHTML = list.map(r => `
    <tr>
      <td><strong>${r.name}</strong><br><span style="color:var(--muted);font-size:11.5px">${r.location!=="ส่วนกลาง"?r.location:""}</span></td>
      <td>${r.floor}</td>
      <td>${r.zone}</td>
      <td>${r.day_raw||"-"}</td>
      <td>${statusBadge(r)}</td>
      <td><a class="row-link" href="checklist.html?room=${r.id}">เปิดฟอร์ม →</a></td>
    </tr>
  `).join("");

  cardMobile.innerHTML = list.map(r => `
    <div class="room-row-card">
      <div class="top">
        <div>
          <div class="name">${r.name}</div>
          <div class="meta">ชั้น ${r.floor} · โซน ${r.zone} · ${r.day_raw||"-"}</div>
        </div>
        ${statusBadge(r)}
      </div>
      <div style="margin-top:8px"><a class="row-link" href="checklist.html?room=${r.id}">เปิดฟอร์มตรวจ →</a></div>
    </div>
  `).join("");
}

document.getElementById("tabs").addEventListener("click", (e)=>{
  const btn = e.target.closest(".tab");
  if (!btn) return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  activeTab = btn.getAttribute("data-tab");
  render();
});
["searchBox","floorFilter","zoneFilter","supFilter"].forEach(id=>{
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});

populateFilters();
renderStats();
render();
loadRemoteRecords();
</script>
