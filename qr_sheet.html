<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พิมพ์ QR Code ห้องงานระบบ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0e2a3d; --teal:#0f7a72; --line:#dcd8cd; --muted:#6b7178; --paper:#f7f5f0;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sarabun',sans-serif;background:var(--paper);color:#1b1f22;}
  .topbar{background:var(--navy);color:#fff;padding:16px 18px;}
  .topbar h1{font-size:17px;margin:0 0 2px;}
  .topbar .sub{font-size:12px;opacity:.7;}
  .controls{
    max-width:1000px;margin:0 auto;padding:14px 18px;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  }
  .controls select, .controls input{
    padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:13.5px;background:#fff;
  }
  .controls input{flex:1;min-width:180px;}
  .print-btn{
    background:var(--teal);color:#fff;border:none;border-radius:10px;padding:10px 18px;
    font-family:inherit;font-weight:700;font-size:13.5px;cursor:pointer;
  }
  .baseurl-note{
    max-width:1000px;margin:0 auto 4px;padding:0 18px;font-size:12px;color:var(--muted);
  }
  .grid{
    max-width:1000px;margin:0 auto;padding:10px 18px 60px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;
  }
  .tile{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:12px;text-align:center;break-inside:avoid;
  }
  .tile .qr{display:flex;justify-content:center;margin-bottom:8px;}
  .tile .rname{font-weight:700;font-size:13px;line-height:1.3;margin-bottom:2px;}
  .tile .rmeta{font-size:11px;color:var(--muted);}
  .tile .rid{font-size:10px;color:var(--muted);margin-top:3px;}
  @media print{
    .topbar,.controls,.baseurl-note{display:none;}
    body{background:#fff;}
    .grid{grid-template-columns:repeat(4,1fr);gap:10px;}
    .tile{border:1px solid #999;}
  }
</style>
</head>

<div class="topbar">

  <div class="sub">อาคารภูมิสิริมังคลานุสรณ์</div>
</div>

<div class="baseurl-note" id="baseUrlNote"></div>
<div class="controls">

  <button class="print-btn" onclick="window.print()">🖨️ พิมพ์หน้านี้</button>
</div>

<div class="grid" id="grid"></div>

  floors.forEach(f=>{
    const o = document.createElement("option");
    o.value = f; o.textContent = "ชั้น " + f;
    sel.appendChild(o);
  });
}

function render(){
  const floor = document.getElementById("floorFilter").value;
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  let list = ROOMS.slice();
  if (floor) list = list.filter(r=>r.floor===floor);
  if (q) list = list.filter(r=>r.name.toLowerCase().includes(q));

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  list.forEach(r=>{
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.innerHTML = `
      <div class="qr" id="qr_${r.id}"></div>
      <div class="rname">${r.name}</div>
      <div class="rmeta">ชั้น ${r.floor} · โซน ${r.zone}</div>
      <div class="rid">รหัสห้อง #${r.id}</div>
    `;
    grid.appendChild(tile);
    new QRCode(tile.querySelector(".qr"), {
      text: BASE + "?room=" + r.id,
      width: 110,
      height: 110,
      colorDark: "#0e2a3d",
      colorLight: "#ffffff"
    });
  });
}

populateFilter();
["floorFilter","searchBox"].forEach(id=>{
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});
render();
</script>
</body>
</html>
