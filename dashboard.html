<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แดชบอร์ดหัวหน้าช่าง — 5ส ห้องงานระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0e2a3d; --teal:#0f7a72; --line:#dcd8cd; --muted:#6b7178; --paper:#f7f5f0;
    --red:#c0392b; --amber:#b8860b; --green:#1e7d5c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sarabun',sans-serif;background:var(--paper);color:#1b1f22;}

  /* ---------- Password gate ---------- */
  #gate{
    position:fixed;inset:0;background:var(--navy);z-index:999;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    color:#fff;padding:20px;text-align:center;
  }
  #gate h2{margin:0;font-size:18px;}
  #gate input{
    padding:12px 14px;border-radius:10px;border:none;font-family:inherit;font-size:15px;
    width:220px;text-align:center;
  }
  #gate button{
    background:var(--teal);color:#fff;border:none;border-radius:10px;padding:11px 22px;
    font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;
  }
  #gate .err{color:#ff9d8a;font-size:13px;min-height:16px;}
  #gate .hint{font-size:11px;opacity:.55;max-width:280px;}

  /* ---------- App shell ---------- */
  #app{display:none;}
  .topbar{background:var(--navy);color:#fff;padding:16px 18px;}
  .topbar h1{font-size:17px;margin:0 0 2px;}
  .topbar .sub{font-size:12px;opacity:.7;}

  .controls{
    max-width:1100px;margin:0 auto;padding:14px 18px 0;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  }
  .controls select, .controls input{
    padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:13.5px;background:#fff;
  }
  .controls input[type="text"]{flex:1;min-width:160px;}
  .todaybtn{
    background:#fff;border:1px solid var(--teal);color:var(--teal);border-radius:10px;
    padding:9px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;
  }
  .todaybtn.active{background:var(--teal);color:#fff;}

  .stats{
    max-width:1100px;margin:0 auto;padding:14px 18px 0;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;
  }
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;}
  .stat .num{font-size:26px;font-weight:700;line-height:1;}
  .stat .lbl{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .stat.ok .num{color:var(--green);}
  .stat.bad .num{color:var(--red);}
  .stat.pending .num{color:var(--amber);}

  .section-title{
    max-width:1100px;margin:22px auto 8px;padding:0 18px;
    font-size:14px;font-weight:700;color:var(--navy);
    display:flex;align-items:center;gap:8px;
  }
  .section-title .count{
    background:var(--line);color:var(--navy);border-radius:999px;padding:1px 9px;font-size:12px;font-weight:700;
  }

  .list{max-width:1100px;margin:0 auto;padding:0 18px 40px;display:flex;flex-direction:column;gap:8px;}

  .card{
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;
  }
  .card:hover{border-color:var(--teal);}
  .card .left{min-width:0;}
  .card .rname{font-weight:700;font-size:14px;}
  .card .rmeta{font-size:12px;color:var(--muted);margin-top:2px;}
  .badge{
    font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0;
  }
  .badge.pass{background:#e4f3ec;color:var(--green);}
  .badge.issue{background:#fbe7e4;color:var(--red);}
  .badge.pending{background:#fdf1d8;color:var(--amber);}

  .empty{color:var(--muted);font-size:13px;padding:14px;text-align:center;}

  /* ---------- Detail modal ---------- */
  #modalBg{
    position:fixed;inset:0;background:rgba(14,42,61,.55);display:none;
    align-items:flex-end;justify-content:center;z-index:500;
  }
  #modalBg.show{display:flex;}
  #modal{
    background:#fff;border-radius:16px 16px 0 0;max-width:560px;width:100%;max-height:88vh;overflow:auto;
    padding:18px;
  }
  @media(min-width:640px){
    #modalBg{align-items:center;}
    #modal{border-radius:16px;}
  }
  #modal .mclose{
    float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);
  }
  #modal h3{margin:0 0 2px;font-size:17px;color:var(--navy);}
  #modal .mmeta{font-size:12.5px;color:var(--muted);margin-bottom:12px;}
  #modal .row{
    display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;
  }
  #modal .row .k{color:var(--muted);flex-shrink:0;}
  #modal .row .v{text-align:right;}
  #modal .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
  #modal .photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer;}
  #modal .note{font-size:12px;color:var(--muted);margin-top:10px;}

  #lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:700;
  }
  #lightbox.show{display:flex;}
  #lightbox img{max-width:94vw;max-height:90vh;object-fit:contain;}
</style>
</head>
<body>

<div id="gate">
  <h2>🔒 แดชบอร์ดหัวหน้าช่าง</h2>
  <div>กรุณาใส่รหัสผ่านเพื่อเข้าดูข้อมูล</div>
  <input type="password" id="pwInput" placeholder="รหัสผ่าน" autofocus>
  <button onclick="checkPassword()">เข้าสู่ระบบ</button>
  <div class="err" id="pwErr"></div>
  <div class="hint">หมายเหตุ: รหัสผ่านนี้ป้องกันการเปิดดูโดยไม่ตั้งใจเท่านั้น ไม่ใช่ระบบความปลอดภัยระดับสูง</div>
</div>

<div id="app">
  <div class="topbar">
    <h1>แดชบอร์ดหัวหน้าช่าง — สรุปผลตรวจ 5ส ห้องงานระบบ</h1>
    <div class="sub">อาคารภูมิสิริมังคลานุสรณ์</div>
  </div>

  <div class="controls">
    <button class="todaybtn" id="todayBtn" onclick="setToday()">📅 วันนี้</button>
    <input type="date" id="dateInput">
    <select id="floorFilter"><option value="">ทุกชั้น</option></select>
    <select id="zoneFilter"><option value="">ทุกโซน</option></select>
    <input type="text" id="searchBox" placeholder="ค้นหาชื่อห้อง...">
  </div>

  <div class="stats" id="stats"></div>

  <div class="section-title">📋 ห้องที่ตรวจแล้ว <span class="count" id="cInspected">0</span></div>
  <div class="list" id="listInspected"></div>

  <div class="section-title">⏳ ห้องที่ยังไม่ได้ตรวจ (วันที่เลือก) <span class="count" id="cPending">0</span></div>
  <div class="list" id="listPending"></div>
</div>

<div id="modalBg" onclick="if(event.target===this)closeModal()">
  <div id="modal"></div>
</div>
<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="">
</div>

let currentRecords = [];

// ============================================================
// Helpers
// ============================================================
function todayStr(){
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function driveThumb(url, size){
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) return url;
  return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w" + (size||500);
}

function populateFilters(){
  const floors = [...new Set(ROOMS.map(r=>r.floor))];
  const floorSel = document.getElementById("floorFilter");
  floors.forEach(f=>{
    const o = document.createElement("option");
    o.value = f; o.textContent = "ชั้น " + f;
    floorSel.appendChild(o);
  });
  const zones = [...new Set(ROOMS.map(r=>r.zone))];
  const zoneSel = document.getElementById("zoneFilter");
  zones.forEach(z=>{
    const o = document.createElement("option");
    o.value = z; o.textContent = "โซน " + z;
    zoneSel.appendChild(o);
  });
}

function setToday(){
  document.getElementById("dateInput").value = todayStr();
  loadData();
}

async function loadData(){
  const date = document.getElementById("dateInput").value;
  document.getElementById("todayBtn").classList.toggle("active", date === todayStr());
  try{
    const url = CONFIG.GAS_URL + "?action=records&date=" + encodeURIComponent(date);
    const resp = await fetch(url);
    currentRecords = await resp.json();
  }catch(e){
    currentRecords = [];
    console.error("โหลดข้อมูลไม่สำเร็จ", e);
  }
  render();
}

function render(){
  const floor = document.getElementById("floorFilter").value;
  const zone = document.getElementById("zoneFilter").value;
  const q = document.getElementById("searchBox").value.trim().toLowerCase();

  let roomsInScope = ROOMS.slice();
  if (floor) roomsInScope = roomsInScope.filter(r=>r.floor===floor);
  if (zone) roomsInScope = roomsInScope.filter(r=>r.zone===zone);
  if (q) roomsInScope = roomsInScope.filter(r=>r.name.toLowerCase().includes(q));

  // ใช้ roomId ล่าสุดต่อห้อง (ถ้าห้องเดียวถูกตรวจซ้ำในวันเดียวกัน เอาอันล่าสุด)
  const byRoom = {};
  currentRecords.forEach(rec=>{
    byRoom[rec.roomId] = rec; // แถวหลังทับแถวก่อน => รายการล่าสุดชนะ
  });

  const inspectedIds = new Set();
  const inspectedList = [];
  roomsInScope.forEach(room=>{
    const rec = byRoom[room.id];
    if (rec){
      inspectedIds.add(room.id);
      inspectedList.push({room, rec});
    }
  });
  const pendingList = roomsInScope.filter(r=>!inspectedIds.has(r.id));

  const issueCount = inspectedList.filter(x=>x.rec.overall === "พบปัญหา").length;
  const passCount = inspectedList.length - issueCount;

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="num">${roomsInScope.length}</div><div class="lbl">ห้องทั้งหมด (ตามตัวกรอง)</div></div>
    <div class="stat ok"><div class="num">${passCount}</div><div class="lbl">ผ่าน</div></div>
    <div class="stat bad"><div class="num">${issueCount}</div><div class="lbl">พบปัญหา</div></div>
    <div class="stat pending"><div class="num">${pendingList.length}</div><div class="lbl">ยังไม่ได้ตรวจ</div></div>
  `;

  document.getElementById("cInspected").textContent = inspectedList.length;
  document.getElementById("cPending").textContent = pendingList.length;

  const listInspected = document.getElementById("listInspected");
  if (!inspectedList.length){
    listInspected.innerHTML = `<div class="empty">ยังไม่มีห้องที่ตรวจในวันที่เลือก (ตามตัวกรองนี้)</div>`;
  } else {
    listInspected.innerHTML = inspectedList.map(({room,rec})=>`
      <div class="card" onclick='openModal(${JSON.stringify(rec).replace(/'/g,"&apos;")})'>
        <div class="left">
          <div class="rname">${room.name}</div>
          <div class="rmeta">ชั้น ${room.floor} · โซน ${room.zone} · ผู้ตรวจ: ${rec.inspector || "-"} · ${rec.submittedAt || ""}</div>
        </div>
        <span class="badge ${rec.overall==='พบปัญหา'?'issue':'pass'}">${rec.overall}</span>
      </div>
    `).join("");
  }

  const listPending = document.getElementById("listPending");
  if (!pendingList.length){
    listPending.innerHTML = `<div class="empty">ตรวจครบทุกห้องแล้ว 🎉</div>`;
  } else {
    listPending.innerHTML = pendingList.map(room=>`
      <div class="card" style="cursor:default;">
        <div class="left">
          <div class="rname">${room.name}</div>
          <div class="rmeta">ชั้น ${room.floor} · โซน ${room.zone}</div>
        </div>
        <span class="badge pending">ยังไม่ตรวจ</span>
      </div>
    `).join("");
  }
}

function openModal(rec){
  const modal = document.getElementById("modal");
  const rows = [
    ["ผู้ตรวจ", rec.inspector || "-"],
    ["วันที่ตรวจ", rec.inspDate || "-"],
    ["เวลาบันทึก", rec.submittedAt || "-"],
    ["ความสะอาด", rec.clean==="ok" ? "สะอาด" : ("ไม่สะอาด — " + (rec.cleanReason||""))],
    ["การล็อก", rec.lock==="ok" ? "ล็อกได้" : ("ล็อกไม่ได้ — " + (rec.lockReason||""))],
    ["ระดับพื้นห้อง", rec.floorStatus==="ok" ? "ปกติ" : ("ไม่ปกติ — " + (rec.floorReason||""))],
  ];
  let photosHtml = "";
  if (rec.photoLinks && rec.photoLinks.length){
    photosHtml = `<div class="photos">` + rec.photoLinks.map(u=>
      `<img src="${driveThumb(u,300)}" onclick="event.stopPropagation();openLightbox('${driveThumb(u,1600)}')">`
    ).join("") + `</div>`;
  } else if (rec.photoNote){
    photosHtml = `<div class="note">${rec.photoNote}</div>`;
  }

  modal.innerHTML = `
    <button class="mclose" onclick="closeModal()">✕</button>
    <h3>${rec.roomName}</h3>
    <div class="mmeta">ชั้น ${rec.floor} · โซน ${rec.zone} · ${rec.location||""}</div>
    ${rows.map(([k,v])=>`<div class="row"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("")}
    ${rec.note ? `<div class="note">หมายเหตุ: ${rec.note}</div>` : ""}
    ${photosHtml}
  `;
  document.getElementById("modalBg").classList.add("show");
}
function closeModal(){
  document.getElementById("modalBg").classList.remove("show");
}
function openLightbox(src){
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("show");
}

function init(){
  populateFilters();
  document.getElementById("dateInput").value = todayStr();
  ["floorFilter","zoneFilter","searchBox"].forEach(id=>{
    document.getElementById(id).addEventListener("input", render);
    document.getElementById(id).addEventListener("change", render);
  });
  document.getElementById("dateInput").addEventListener("change", loadData);
  loadData();
}

if (sessionStorage.getItem("5s_dash_auth") === "1"){
  init();
}
</script>
