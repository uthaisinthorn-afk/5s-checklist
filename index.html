<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ตรวจเช็ก 5ส ห้องงานระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0e2a3d;
    --navy-2:#123a52;
    --teal:#0f7a72;
    --teal-light:#e6f4f2;
    --amber:#c8791a;
    --amber-light:#fbeee0;
    --red:#b7362f;
    --red-light:#fbeceb;
    --paper:#f7f5f0;
    --line:#dcd8cd;
    --ink:#1b1f22;
    --muted:#6b7178;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Sarabun',sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding-bottom:100px;
  }
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:16px 18px 14px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .topbar .eyebrow{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.65;
    margin-bottom:2px;
  }
  .topbar h1{
    font-size:17px;
    margin:0;
    font-weight:700;
  }
  .wrap{max-width:640px;margin:0 auto;padding:16px;}

  .picker-box{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-bottom:16px;
  }
  .picker-box h2{margin:0 0 10px;font-size:15px;color:var(--navy);}
  .picker-box input[type=text]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-family:inherit;
    font-size:15px;
    margin-bottom:10px;
  }
  .search-results{max-height:280px;overflow-y:auto;border-top:1px solid var(--line);}
  .search-item{
    padding:11px 6px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }
  .search-item:hover{background:var(--teal-light);}
  .search-item .name{font-weight:600;font-size:14px;}
  .search-item .meta{font-size:12px;color:var(--muted);}

  .room-card{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;
    border-radius:16px;
    padding:20px 20px 18px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .room-card .tag{
    display:inline-block;
    background:rgba(255,255,255,.14);
    border-radius:999px;
    padding:3px 10px;
    font-size:11.5px;
    letter-spacing:.03em;
    margin-right:6px;
    margin-bottom:8px;
  }
  .room-card h2{margin:2px 0 4px;font-size:20px;line-height:1.3;}
  .room-card .sub{font-size:13px;opacity:.8;margin-bottom:2px;}
  .room-card .change-link{
    position:absolute;top:16px;right:16px;
    font-size:12px;
    color:#fff;opacity:.75;
    text-decoration:underline;
    cursor:pointer;
  }

  .field-row{display:flex;gap:10px;margin-bottom:14px;}
  .field-row > div{flex:1;}
  .field-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field-row input{
    width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;font-family:inherit;font-size:14px;background:#fff;
  }

  .section{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 14px;
    margin-bottom:14px;
  }
  .section .head{
    display:flex;align-items:baseline;gap:8px;
    margin-bottom:12px;
  }
  .section .head .num{
    width:22px;height:22px;border-radius:50%;
    background:var(--teal);color:#fff;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .section .head h3{margin:0;font-size:15px;color:var(--navy);}

  .toggle-pair{display:flex;gap:10px;}
  .toggle-btn{
    flex:1;
    padding:14px 8px;
    border-radius:10px;
    border:2px solid var(--line);
    background:#fff;
    font-family:inherit;
    font-size:14.5px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    text-align:center;
    transition:.12s;
  }
  .toggle-btn.ok.active{border-color:var(--teal);background:var(--teal-light);color:var(--teal);}
  .toggle-btn.bad.active{border-color:var(--red);background:var(--red-light);color:var(--red);}

  .reason-box{
    margin-top:10px;
    display:none;
  }
  .reason-box.show{display:block;}
  .reason-box textarea{
    width:100%;
    border:1px solid var(--red);
    background:var(--red-light);
    border-radius:10px;
    padding:10px 12px;
    font-family:inherit;
    font-size:14px;
    resize:vertical;
    min-height:56px;
  }
  .reason-box .hint{font-size:11.5px;color:var(--red);margin-top:4px;}

  textarea.note{
    width:100%;border:1px solid var(--line);border-radius:10px;
    padding:12px;font-family:inherit;font-size:14px;min-height:70px;resize:vertical;
  }

  .photo-zone{
    border:2px dashed var(--line);
    border-radius:14px;
    padding:18px;
    text-align:center;
    background:#fcfbf8;
  }
  .photo-zone.has-photos{padding:12px;}
  .photo-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--navy);color:#fff;
    border:none;border-radius:10px;
    padding:12px 18px;font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;
  }
  .photo-hint{font-size:12px;color:var(--muted);margin-top:8px;}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .rm{
    position:absolute;top:2px;right:2px;
    width:20px;height:20px;border-radius:50%;
    background:rgba(0,0,0,.6);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;cursor:pointer;line-height:1;
  }

  .footer-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:1px solid var(--line);
    padding:12px 16px;
    box-shadow:0 -4px 14px rgba(0,0,0,.06);
    z-index:30;
  }
  .footer-bar .inner{max-width:640px;margin:0 auto;}
  .submit-btn{
    width:100%;padding:15px;border:none;border-radius:12px;
    background:var(--teal);color:#fff;font-family:inherit;font-size:16px;font-weight:700;
    cursor:pointer;
  }
  .submit-btn:disabled{background:#a9b3b1;}
  .status-line{font-size:12px;text-align:center;margin-top:6px;color:var(--muted);}

  .toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;
    font-size:14px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2);
    max-width:90%;text-align:center;
  }
  .toast.err{background:var(--red);}
  .toast.ok{background:var(--teal);}

  .empty-hint{
    text-align:center;color:var(--muted);font-size:13px;padding:14px 0;
  }
  a.dash-link{color:#fff;opacity:.7;font-size:12px;}
</style>
</head>

}

}
function saveRecords(arr){
  localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(arr));
}

function showToast(msg, type){
  const t = document.createElement("div");
  t.className = "toast" + (type ? " "+type : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

// ---------- compress photo to base64 jpeg ----------
function fileToCompressedDataUrl(file, maxDim=900, quality=0.6){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if (h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function findRoom(id){
  return ROOMS.find(r => String(r.id) === String(id));
}

  const app = document.getElementById("app");
  if (roomIdParam && findRoom(roomIdParam)){
    currentRoom = findRoom(roomIdParam);
    renderForm();

}

function renderPicker(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="picker-box">
      <h2>เลือกห้องที่จะตรวจ</h2>
      <input type="text" id="searchInput" placeholder="พิมพ์ชื่อห้อง เช่น ห้องไฟฟ้า, Chiller, ชั้น 5 ...">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="empty-hint">หรือสแกน QR code ที่ติดหน้าห้อง เพื่อเปิดฟอร์มของห้องนั้นโดยตรง</div>
    <div class="empty-hint"><a class="dash-link" style="color:var(--muted)" href="${CONFIG.DASHBOARD_PATH}">← กลับไปหน้าแดชบอร์ด</a></div>
  `;
  const input = document.getElementById("searchInput");
  const resultsEl = document.getElementById("searchResults");
  function renderResults(list){
    resultsEl.innerHTML = list.slice(0,40).map(r => `
      <div class="search-item" data-id="${r.id}">
        <div>
          <div class="name">${r.name}</div>
          <div class="meta">ชั้น ${r.floor} · โซน ${r.zone}${r.location && r.location!=="ส่วนกลาง" ? " · "+r.location : ""}</div>
        </div>
        <div class="meta">#${r.id}</div>
      </div>
    `).join("") || `<div class="empty-hint">ไม่พบห้องที่ค้นหา</div>`;
    resultsEl.querySelectorAll(".search-item").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = el.getAttribute("data-id");
        location.href = "?room="+id;
      });
    });
  }
  renderResults(ROOMS);
  input.addEventListener("input", ()=>{
    const q = input.value.trim().toLowerCase();
    const list = q ? ROOMS.filter(r => (r.name+" "+r.floor+" "+r.zone).toLowerCase().includes(q)) : ROOMS;
    renderResults(list);
  });
}

function toggleGroup(key, value, reasonNeeded){
  checks[key] = value;
  render_active_states();
}
function render_active_states(){
  ["clean","lock","floor"].forEach(key=>{
    const okBtn = document.getElementById(key+"_ok");
    const badBtn = document.getElementById(key+"_bad");
    const reasonBox = document.getElementById(key+"_reasonbox");
    if(!okBtn) return;
    okBtn.classList.toggle("active", checks[key]==="ok");
    badBtn.classList.toggle("active", checks[key]==="bad");
    reasonBox.classList.toggle("show", checks[key]==="bad");
  });
}

      <div class="toggle-pair">
        <button type="button" class="toggle-btn ok" id="floor_ok" onclick="toggleGroup('floor','ok')">ปกติ</button>
        <button type="button" class="toggle-btn bad" id="floor_bad" onclick="toggleGroup('floor','bad')">ไม่ปกติ</button>
      </div>
      <div class="reason-box" id="floor_reasonbox">
        <textarea id="floor_reason" placeholder="ระบุเหตุผล เช่น พื้นทรุด, มีน้ำขัง..."></textarea>
        <div class="hint">กรุณาระบุเหตุผลและถ่ายรูปประกอบด้านล่าง</div>
      </div>
    </div>

    <div class="section">
      <div class="head"><span class="num">4</span><h3>หมายเหตุอื่นๆ</h3></div>
      <textarea class="note" id="otherNote" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
    </div>

    <div class="section">
      <div class="head"><span class="num">5</span><h3>รูปถ่ายหลักฐาน</h3></div>
      <div class="photo-zone" id="photoZone">
        <div class="thumbs" id="thumbs"></div>
        <label class="photo-btn">
          📷 ถ่าย/เลือกรูป
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none" multiple>
        </label>
        <div class="photo-hint">แนบได้สูงสุด 4 รูป · ระบบจะบีบอัดไฟล์อัตโนมัติ</div>
      </div>
    </div>

    <div class="footer-bar">
      <div class="inner">
        <button class="submit-btn" id="submitBtn">บันทึกผลตรวจ</button>
        <div class="status-line" id="statusLine">ข้อมูลจะถูกเก็บไว้ในเครื่องก่อน แล้วซิงค์ขึ้นระบบเมื่อมีสัญญาณ</div>
      </div>
    </div>
  `;
  photos = [];
  checks = {clean:null,cleanReason:"",lock:null,lockReason:"",floor:null,floorReason:""};
  document.getElementById("changeRoomBtn").addEventListener("click", ()=>{ location.href = location.pathname; });
  document.getElementById("photoInput").addEventListener("change", onPhotosSelected);
  document.getElementById("submitBtn").addEventListener("click", onSubmit);
  renderThumbs();
}

async function onPhotosSelected(e){
  const files = Array.from(e.target.files || []);
  for (const f of files){
    if (photos.length >= 4){ showToast("แนบได้สูงสุด 4 รูป", "err"); break; }
    try{
      const dataUrl = await fileToCompressedDataUrl(f);
      photos.push(dataUrl);
    }catch(err){ console.error(err); }
  }
  e.target.value = "";
  renderThumbs();
}
function removePhoto(i){
  photos.splice(i,1);
  renderThumbs();
}
function renderThumbs(){
  const el = document.getElementById("thumbs");
  if(!el) return;
  el.innerHTML = photos.map((p,i)=>`
    <div class="thumb"><img src="${p}"><div class="rm" onclick="removePhoto(${i})">✕</div></div>
  `).join("");
}

function validate(){
  for (const key of ["clean","lock","floor"]){
    if (!checks[key]){
      showToast("กรุณาติ๊กสถานะให้ครบทั้ง 3 ข้อ", "err");
      return false;
    }
    if (checks[key] === "bad"){
      const reasonEl = document.getElementById(key+"_reason");
      if (!reasonEl.value.trim()){
        showToast("กรุณาระบุเหตุผลในข้อที่ไม่ผ่าน", "err");
        reasonEl.focus();
        return false;
      }
    }
  }
  return true;
}

async function onSubmit(){
  if (!validate()) return;
  const inspector = document.getElementById("inspector").value.trim();
  if (!inspector){ showToast("กรุณาระบุชื่อผู้ตรวจ", "err"); return; }
  localStorage.setItem("fivess_last_inspector", inspector);

  const record = {
    localId: "r"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
    roomId: currentRoom.id,
    roomName: currentRoom.name,
    floor: currentRoom.floor,
    zone: currentRoom.zone,
    location: currentRoom.location,
    supervisor: currentRoom.supervisor,
    inspDate: document.getElementById("inspDate").value,
    inspector: inspector,
    clean: checks.clean,
    cleanReason: document.getElementById("clean_reason").value.trim(),
    lock: checks.lock,
    lockReason: document.getElementById("lock_reason").value.trim(),
    floorStatus: checks.floor,
    floorReason: document.getElementById("floor_reason").value.trim(),
    note: document.getElementById("otherNote").value.trim(),
    photos: photos,
    submittedAt: new Date().toISOString(),
    synced: false
  };

  const records = getRecords();
  records.push(record);
  saveRecords(records);

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "กำลังบันทึก...";
  document.getElementById("statusLine").textContent = "บันทึกลงเครื่องแล้ว กำลังพยายามซิงค์ขึ้นระบบ...";

  const synced = await trySync(record);
  if (synced){
    showToast("บันทึกและซิงค์ขึ้นระบบสำเร็จ", "ok");
  } else {
    showToast("บันทึกลงเครื่องแล้ว (ยังไม่ซิงค์ — จะลองใหม่อัตโนมัติ)", "err");
  }
  setTimeout(()=>{ location.href = location.pathname; }, 1400);
}

async function trySync(record){
  if (!CONFIG.GAS_URL) return false;
  try{
    const resp = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(record)
    });
    if (resp.ok){
      markSynced(record.localId);
      return true;
    }
    return false;
  }catch(e){
    return false;
  }
}
function markSynced(localId){
  const records = getRecords();
  const rec = records.find(r=>r.localId===localId);
  if (rec){ rec.synced = true; saveRecords(records); }
}

// retry unsynced records in background on load
async function retryPendingSync(){
  if (!CONFIG.GAS_URL) return;
  const records = getRecords();
  const pending = records.filter(r=>!r.synced);
  for (const rec of pending){
    await trySync(rec);
  }
}

init();
retryPendingSync();
</script>
</body>
